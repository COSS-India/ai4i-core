apiVersion: v1
kind: ConfigMap
metadata:
  name: nmt-service-config
  namespace: dev
data:
  ALLOW_ANONYMOUS_ACCESS: "false"
  API_KEY_CACHE_TTL: "300"
  AUTH_ENABLED: "true"
  DATABASE_URL: postgresql+asyncpg://ai4v_user:password123@postgres.dev.svc.cluster.local:5432/ai4v_db
  DB_MAX_OVERFLOW: "10"
  DB_POOL_SIZE: "20"
  DEFAULT_SOURCE_LANGUAGE: en
  DEFAULT_TARGET_LANGUAGE: hi
  ENABLE_AUTO_LANGUAGE_DETECTION: "true"
  ENABLE_SCRIPT_DETECTION: "true"
  ENABLE_TEXT_NORMALIZATION: "true"
  LANGUAGE_DETECTION_CONFIDENCE_THRESHOLD: "0.7"
  LOG_LEVEL: INFO
  MAX_BATCH_SIZE: "90"
  MAX_TEXT_LENGTH: "10000"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_DAY: "10000"
  RATE_LIMIT_PER_HOUR: "1000"
  RATE_LIMIT_PER_MINUTE: "60"
  REDIS_HOST: redis.dev.svc.cluster.local
  REDIS_PASSWORD: redispass
  REDIS_PORT: "6379"
  REDIS_PORT_NUMBER: "6379"
  REDIS_TIMEOUT: "5"
  REQUIRE_API_KEY: "true"
  SERVICE_NAME: nmt-service
  SERVICE_PORT: "8089"
  SESSION_TIMEOUT_SECONDS: "3600"
  SUPPORTED_LANGUAGES: en,hi,ta,te,kn,ml,bn,gu,mr,pa,or,as,ur,sa,ks,ne,sd,kok,doi,mai,brx,mni
  TRITON_CONCURRENCY: "20"
  TRITON_ENDPOINT: http://triton-server:8000
  TRITON_TIMEOUT: "20"
